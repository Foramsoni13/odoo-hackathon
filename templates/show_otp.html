<!DOCTYPE html>
<html>
<head>
    <title>OTP Generated</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            overflow:hidden;
        }

        .bg-slider{
            position:fixed;width:100%;height:100%;top:0;left:0;z-index:-2;
        }

        .bg-slider img{
            position:absolute;width:100%;height:100%;
            object-fit:cover;
            opacity:0;
            animation:slide 15s infinite;
        }

        .bg-slider img:nth-child(1){animation-delay:0s;}
        .bg-slider img:nth-child(2){animation-delay:5s;}
        .bg-slider img:nth-child(3){animation-delay:10s;}

        @keyframes slide{
            0%{opacity:0;}
            10%{opacity:1;}
            30%{opacity:1;}
            40%{opacity:0;}
            100%{opacity:0;}
        }

        .overlay{
            position:fixed;width:100%;height:100%;
            background:rgba(0,0,0,0.35);
            z-index:-1;
        }

        .box{
            width:350px;
            padding:25px;
            background:rgba(255,255,255,0.15);
            border-radius:20px;
            border:1px solid rgba(255,255,255,0.25);
            backdrop-filter:blur(16px);
            text-align:center;
            color:white;
        }

        .otp{
            font-size:32px;
            color:#00ffcc;
            margin:15px 0;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:12px;
            background:#875A7B;
            border:none;
            color:white;
            border-radius:9px;
            font-weight:bold;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="bg-slider">
    <img src="{{ url_for('static', filename='images/travel1.jpg') }}">
    <img src="{{ url_for('static', filename='images/travel2.jpg') }}">
    <img src="{{ url_for('static', filename='images/travel3.jpg') }}">
</div>

<div class="overlay"></div>

<div class="box">

    <h2>Your OTP</h2>

    <div class="otp">{{ otp }}</div>

    <a href="/verify-otp">
        <button>Continue</button>
    </a>

</div>

</body>
</html>
